name: refresh-threads-token
on:
  schedule:
    - cron: "0 3 1,15 * *"
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -q requests pynacl
      - id: refresh
        env:
          THREADS_TOKEN: ${{ secrets.THREADS_TOKEN }}
        run: python rotate_credential.py
      - env:
          GH_PAT: ${{ secrets.GH_PAT }}
          NEW_TOKEN: ${{ steps.refresh.outputs.new_token }}
        run: python push_secret.py
