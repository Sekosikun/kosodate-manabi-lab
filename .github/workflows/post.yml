name: post-to-threads
on:
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - env:
          THREADS_TOKEN: ${{ secrets.THREADS_TOKEN }}
        run: python post_to_threads.py
      - run: |
          git config user.name "gh-actions"; git config user.email "a@b.c"
          git add -A; git diff --cached --quiet || git commit -m "update [skip ci]"; git push
