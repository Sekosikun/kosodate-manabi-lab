name: post-to-threads

on:
  schedule:
    # UTC指定（日本時間 = UTC+9）。例: 0時UTC=朝9時JST / 3時UTC=昼12時JST / 11時UTC=夜20時JST
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: post
        env:
          THREADS_TOKEN: ${{ secrets.THREADS_TOKEN }}
        run: python post_to_threads.py
      - name: save queue
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git diff --cached --quiet || git commit -m "update queue [skip ci]"
          git push
