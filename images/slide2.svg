<svg width="100%" viewBox="0 0 680 900" role="img" xmlns="http://www.w3.org/2000/svg"><title>進研ゼミ小学講座の深掘りスライド</title><desc>進研ゼミを実質総額・共働き適性・続けやすさ・レベル・デメリット・向く家庭の6軸で深掘り</desc><rect x="0" y="0" width="680" height="900" fill="#F7F3EA"/><rect x="0" y="0" width="680" height="164" fill="#D85A30"/><g font-family="sans-serif"><text x="40" y="78" font-size="30" font-weight="700" fill="#FFF3EC">進研ゼミ 小学講座</text><text x="40" y="120" font-size="17" fill="#FBE0D3">王道・続けやすさで選ぶなら</text><text x="636" y="44" font-size="15" fill="#FBE0D3" text-anchor="end">1社目 / 全4社</text><text x="40" y="205" font-size="17" font-weight="700" fill="#C24A26">実質の総額</text><text x="40" y="231" font-size="14" fill="#3b3b39">月3,250円（小1）〜7,150円（小6）・税込。</text><text x="40" y="253" font-size="14" fill="#3b3b39">12カ月一括なら月800〜1,000円お得。</text><text x="40" y="275" font-size="14" fill="#3b3b39">タブレットは6カ月続ければ実質0円（短期退会のみ8,300円）。</text><line x1="40" y1="293" x2="640" y2="293" stroke="#e7e0d2" stroke-width="1"/><text x="40" y="321" font-size="17" font-weight="700" fill="#C24A26">共働き適性 ◎</text><text x="40" y="347" font-size="14" fill="#3b3b39">タッチ版はタブレットがその場で採点・解説。</text><text x="40" y="369" font-size="14" fill="#3b3b39">親が丸つけする場面が少なく、手間が軽い。</text><line x1="40" y1="387" x2="640" y2="387" stroke="#e7e0d2" stroke-width="1"/><text x="40" y="415" font-size="17" font-weight="700" fill="#C24A26">続けやすさ ◎</text><text x="40" y="441" font-size="14" fill="#3b3b39">ゲーム感覚＋努力賞ポイント、赤ペン先生の添削で</text><text x="40" y="463" font-size="14" fill="#3b3b39">やる気が続きやすい。</text><line x1="40" y1="481" x2="640" y2="481" stroke="#e7e0d2" stroke-width="1"/><text x="40" y="509" font-size="17" font-weight="700" fill="#C24A26">レベル感</text><text x="40" y="535" font-size="14" fill="#3b3b39">標準〜基礎をしっかり定着。</text><text x="40" y="557" font-size="14" fill="#3b3b39">難関中学受験をめざすなら別講座が必要。</text><line x1="40" y1="575" x2="640" y2="575" stroke="#e7e0d2" stroke-width="1"/><text x="40" y="603" font-size="17" font-weight="700" fill="#B5631E">正直なデメリット</text><text x="40" y="629" font-size="14" fill="#3b3b39">付録やゲームで“遊び”に気が散る子も。</text><text x="40" y="651" font-size="14" fill="#3b3b39">タブレットは最長6年使用、故障時は再購入</text><text x="40" y="673" font-size="14" fill="#3b3b39">（サポート加入で安価に交換可）。</text><line x1="40" y1="691" x2="640" y2="691" stroke="#e7e0d2" stroke-width="1"/><text x="40" y="719" font-size="17" font-weight="700" fill="#0F6E56">こんな家庭に◎</text><text x="40" y="745" font-size="14" fill="#3b3b39">基礎を楽しく続けたい／共働きで丸つけの</text><text x="40" y="767" font-size="14" fill="#3b3b39">手間を減らしたい家庭に向く。</text><text x="40" y="836" font-size="12" fill="#8a857a">※2026年度の公開情報。最新の料金・内容は公式でご確認ください</text><text x="40" y="864" font-size="14" font-weight="600" fill="#0F6E56">子育てまなびラボ ＠kosodate_manabi_lab</text></g></svg>