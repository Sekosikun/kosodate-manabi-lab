<svg width="680" height="680" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg"><title>子育て中でも始めやすい在宅ワーク3つ</title><desc>未経験のママでもスキマ時間で始めやすい在宅ワークを3つ紹介</desc><rect width="680" height="680" fill="#F7F3EA"/><rect width="680" height="150" fill="#D85A30"/><g font-family="sans-serif"><text x="40" y="80" font-size="26" font-weight="700" fill="#FFF3EC">子育て中でも始めやすい在宅ワーク3つ</text><text x="40" y="120" font-size="18" fill="#FBE0D3">まとまった時間より“スキマ”を使う</text><circle cx="56" cy="216" r="16" fill="#D85A30"/><text x="56" y="222" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">1</text><text x="86" y="222" font-size="18" fill="#2c2c2a">ポイ活・アンケートモニター</text><circle cx="56" cy="296" r="16" fill="#D85A30"/><text x="56" y="302" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">2</text><text x="86" y="302" font-size="18" fill="#2c2c2a">不用品・フリマ販売</text><circle cx="56" cy="376" r="16" fill="#D85A30"/><text x="56" y="382" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">3</text><text x="86" y="382" font-size="18" fill="#2c2c2a">文章やスキルの小さな販売</text><rect x="36" y="440" width="608" height="110" rx="14" fill="#FFFFFF" stroke="#1D9E75" stroke-width="2"/><text x="60" y="486" font-size="17" font-weight="700" fill="#0F6E56">いきなり大きく稼がなくていい。</text><text x="60" y="518" font-size="16" fill="#3b3b39">未経験でも、月数千円〜が現実的な第一歩です。</text><text x="40" y="646" font-size="15" font-weight="600" fill="#8a857a">子育てまなびラボ ＠kosodate_manabi_lab</text></g></svg>