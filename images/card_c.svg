<svg width="100%" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg"><title>早期英語より日本語の語彙</title><desc>幼児期は早期英語より日本語の語彙が学力の土台になる</desc><rect width="680" height="680" fill="#F7F3EA"/><rect width="680" height="150" fill="#1D9E75"/><g font-family="sans-serif"><text x="40" y="84" font-size="28" font-weight="700" fill="#F5F1E8">早期英語より、まず日本語の語彙</text><text x="40" y="122" font-size="18" fill="#eaf6f0">幼児期にいちばん効く“土台”の話</text><circle cx="52" cy="222" r="6" fill="#1D9E75"/><text x="72" y="228" font-size="18" fill="#2c2c2a">後の学力を支えるのは“語彙力”</text><circle cx="52" cy="292" r="6" fill="#1D9E75"/><text x="72" y="298" font-size="18" fill="#2c2c2a">読み聞かせが、最強の語彙トレーニング</text><circle cx="52" cy="362" r="6" fill="#1D9E75"/><text x="72" y="368" font-size="18" fill="#2c2c2a">英語は焦らなくて大丈夫</text><rect x="36" y="430" width="608" height="110" rx="14" fill="#FFFFFF" stroke="#1D9E75" stroke-width="2"/><text x="60" y="476" font-size="17" font-weight="700" fill="#0F6E56">まずは、絵本。</text><text x="60" y="508" font-size="16" fill="#3b3b39">お金をかけなくても、今日から始められます。</text><text x="40" y="636" font-size="15" font-weight="600" fill="#8a857a">子育てまなびラボ ＠kosodate_manabi_lab</text></g></svg>