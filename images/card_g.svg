<svg width="680" height="680" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg"><title>子供オンライン英会話、講師のタイプ2つ</title><desc>フィリピン人講師とネイティブ講師の違いと選び方</desc><rect width="680" height="680" fill="#F7F3EA"/><rect width="680" height="150" fill="#1D9E75"/><g font-family="sans-serif"><text x="40" y="80" font-size="27" font-weight="700" fill="#F5F1E8">講師タイプで、値段も内容も違う🌏</text><text x="40" y="120" font-size="17" fill="#eaf6f0">子供オンライン英会話、選び方の基本</text><circle cx="52" cy="216" r="6" fill="#1D9E75"/><text x="72" y="222" font-size="18" fill="#2c2c2a">フィリピン人講師 → 料金おさえめ</text><circle cx="52" cy="266" r="6" fill="#1D9E75"/><text x="72" y="272" font-size="18" fill="#2c2c2a">ネイティブ講師 → 発音・単価は高め</text><circle cx="52" cy="316" r="6" fill="#D85A30"/><text x="72" y="322" font-size="18" fill="#2c2c2a">日本語OK講師 → 初めてでも安心</text><rect x="36" y="380" width="608" height="120" rx="14" fill="#FFFFFF" stroke="#1D9E75" stroke-width="2"/><text x="60" y="426" font-size="17" font-weight="700" fill="#0F6E56">正解はひとつじゃない。</text><text x="60" y="458" font-size="16" fill="#3b3b39">「うちの子は人見知り」「まず楽しさ重視」など、</text><text x="60" y="482" font-size="16" fill="#3b3b39">性格と目的で選ぶのがいちばん失敗しません。</text><text x="40" y="646" font-size="15" font-weight="600" fill="#8a857a">子育て奮闘ママ ＠kosodate_manabi_lab</text></g></svg>