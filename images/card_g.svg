<svg width="680" height="680" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg"><title>子供オンライン英会話、講師のタイプ2つ</title><desc>フィリピン人講師とネイティブ講師の違いと選び方</desc><rect width="680" height="680" fill="#F7F3EA"/><rect width="680" height="170" fill="#1D9E75"/><g font-family="sans-serif"><text x="40" y="90" font-size="34" font-weight="700" fill="#F5F1E8">講師タイプで、値段も内容も違う🌏</text><text x="40" y="135" font-size="20" fill="#eaf6f0">子供オンライン英会話、選び方の基本</text><circle cx="52" cy="250" r="8" fill="#1D9E75"/><text x="76" y="259" font-size="25" fill="#2c2c2a">フィリピン人講師 → 料金おさえめ</text><circle cx="52" cy="320" r="8" fill="#1D9E75"/><text x="76" y="329" font-size="25" fill="#2c2c2a">ネイティブ講師 → 発音・単価は高め</text><circle cx="52" cy="390" r="8" fill="#D85A30"/><text x="76" y="399" font-size="25" fill="#2c2c2a">日本語OK講師 → 初めてでも安心</text><rect x="36" y="450" width="608" height="165" rx="16" fill="#FFFFFF" stroke="#1D9E75" stroke-width="2"/><text x="64" y="490" font-size="26" font-weight="700" fill="#0F6E56">正解はひとつじゃない。</text><text x="64" y="530" font-size="25" fill="#3b3b39">「うちの子は人見知り」「まず楽しさ重視」など、</text><text x="64" y="566" font-size="25" fill="#3b3b39">性格と目的で選ぶのがいちばん失敗しません。</text><text x="40" y="650" font-size="17" font-weight="600" fill="#8a857a">子育て奮闘ママ ＠kosodate_manabi_lab</text></g></svg>