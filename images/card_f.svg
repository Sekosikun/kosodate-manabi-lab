<svg width="680" height="680" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg"><title>仕事復帰の前にやっておきたい3つ</title><desc>共働きに戻る前に準備しておくとラクなこと3つ</desc><rect width="680" height="680" fill="#F7F3EA"/><rect width="680" height="150" fill="#D85A30"/><g font-family="sans-serif"><text x="40" y="84" font-size="28" font-weight="700" fill="#FFF3EC">仕事復帰の前にやっておきたい3つ</text><text x="40" y="122" font-size="18" fill="#FBE0D3">共働きを、ラクに始めるために</text><circle cx="56" cy="216" r="16" fill="#D85A30"/><text x="56" y="222" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">1</text><text x="86" y="222" font-size="18" fill="#2c2c2a">家事の仕組み化・時短化</text><circle cx="56" cy="296" r="16" fill="#D85A30"/><text x="56" y="302" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">2</text><text x="86" y="302" font-size="18" fill="#2c2c2a">預け先（学童・延長保育）の下調べ</text><circle cx="56" cy="376" r="16" fill="#D85A30"/><text x="56" y="382" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">3</text><text x="86" y="382" font-size="18" fill="#2c2c2a">お金と口座の整理</text><rect x="36" y="440" width="608" height="110" rx="14" fill="#FFFFFF" stroke="#1D9E75" stroke-width="2"/><text x="60" y="486" font-size="17" font-weight="700" fill="#0F6E56">準備した分だけ、後がラクになる。</text><text x="60" y="518" font-size="16" fill="#3b3b39">焦らず、できることから少しずつ。</text><text x="40" y="646" font-size="15" font-weight="600" fill="#8a857a">子育てまなびラボ ＠kosodate_manabi_lab</text></g></svg>