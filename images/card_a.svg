<svg width="100%" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg"><title>勉強の声かけ 言い換え3つ</title><desc>子どもへの声かけを言い換えるとやる気が変わる例を3つ紹介</desc><rect x="0" y="0" width="680" height="680" fill="#F7F3EA"/><rect x="0" y="0" width="680" height="150" fill="#1D9E75"/><g font-family="sans-serif"><text x="40" y="84" font-size="29" font-weight="700" fill="#F5F1E8">勉強の声かけ、言い換え3つ</text><text x="40" y="122" font-size="18" fill="#eaf6f0">言い方ひとつで、反応は変わる</text><text x="40" y="215" font-size="19" fill="#C0392B">✕「早くやりなさい」</text><text x="40" y="247" font-size="20" font-weight="700" fill="#0F6E56">○「何時から始める？」</text><line x1="40" y1="278" x2="640" y2="278" stroke="#e0d9cb" stroke-width="1"/><text x="40" y="333" font-size="19" fill="#C0392B">✕「なんでできないの」</text><text x="40" y="365" font-size="20" font-weight="700" fill="#0F6E56">○「どこで迷ってる？」</text><line x1="40" y1="396" x2="640" y2="396" stroke="#e0d9cb" stroke-width="1"/><text x="40" y="451" font-size="19" fill="#C0392B">✕「勉強したの？」</text><text x="40" y="483" font-size="20" font-weight="700" fill="#0F6E56">○「今日は何をやった？」</text><line x1="40" y1="514" x2="640" y2="514" stroke="#e0d9cb" stroke-width="1"/><text x="40" y="566" font-size="16" fill="#3b3b39">“やらせる”より“自分で決める”。それだけで動きやすくなります。</text><text x="40" y="646" font-size="15" font-weight="600" fill="#8a857a">子育てまなびラボ ＠kosodate_manabi_lab</text></g></svg>