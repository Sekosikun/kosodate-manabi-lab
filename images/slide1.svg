<svg width="100%" viewBox="0 0 680 900" role="img" xmlns="http://www.w3.org/2000/svg"><title>フック・結論先出しスライド</title><desc>共働き向け通信教育えらびの結論を先に提示するカルーセル1枚目</desc><rect x="0" y="0" width="680" height="900" fill="#F7F3EA"/><rect x="0" y="0" width="680" height="164" fill="#1D9E75"/><g font-family="sans-serif"><text x="40" y="72" font-size="30" font-weight="700" fill="#F5F1E8">共働きの通信教育えらび、</text><text x="40" y="116" font-size="30" font-weight="700" fill="#F5F1E8">失敗したくない人へ。</text><text x="636" y="44" font-size="15" fill="#cfeae0" text-anchor="end">1 / 6</text><text x="40" y="214" font-size="17" fill="#3b3b39">人気4社を“本当に大事な6つの軸”で正直に比較。</text><text x="40" y="246" font-size="17" fill="#3b3b39">—— 先に結論だけ言うと：</text><rect x="32" y="276" width="616" height="296" rx="16" fill="#FFFFFF" stroke="#1D9E75" stroke-width="2"/><text x="56" y="332" font-size="17" fill="#2c2c2a">▶ 手間を減らしたい共働き → <tspan fill="#0F6E56" font-weight="700">進研ゼミ（タッチ）</tspan></text><text x="56" y="388" font-size="17" fill="#2c2c2a">▶ とにかく安くおさえたい → <tspan fill="#0F6E56" font-weight="700">スタディサプリ</tspan></text><text x="56" y="444" font-size="17" fill="#2c2c2a">▶ 学力・中学受験も視野 → <tspan fill="#0F6E56" font-weight="700">Z会</tspan></text><text x="56" y="500" font-size="17" fill="#2c2c2a">▶ タブレット1台で完結 → <tspan fill="#0F6E56" font-weight="700">スマイルゼミ</tspan></text><text x="56" y="548" font-size="14" fill="#8a857a">※“なぜそうなるか”は次ページから1社ずつ深掘り</text><text x="40" y="632" font-size="18" font-weight="600" fill="#1D9E75">▶ スワイプして各社の深掘りへ</text><text x="40" y="668" font-size="15" fill="#8a857a">保存して、検討のお供にどうぞ</text><text x="40" y="852" font-size="15" font-weight="600" fill="#0F6E56">子育てまなびラボ ＠kosodate_manabi_lab</text></g></svg>