<svg width="100%" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg"><title>通信教育が続かない3つの理由</title><desc>通信教育が続かない主な理由3つと、選ぶ基準を紹介</desc><rect x="0" y="0" width="680" height="680" fill="#F7F3EA"/><rect x="0" y="0" width="680" height="150" fill="#D85A30"/><g font-family="sans-serif"><text x="40" y="84" font-size="28" font-weight="700" fill="#FFF3EC">通信教育が続かない3つの理由</text><text x="40" y="122" font-size="18" fill="#FBE0D3">“有名さ”より“合うか”で選ぶ</text><circle cx="56" cy="216" r="16" fill="#D85A30"/><text x="56" y="222" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text><text x="86" y="222" font-size="18" fill="#2c2c2a">子どもの性格・好みに合っていない</text><circle cx="56" cy="296" r="16" fill="#D85A30"/><text x="56" y="302" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text><text x="86" y="302" font-size="18" fill="#2c2c2a">親が見る前提で、時間が取れない</text><circle cx="56" cy="376" r="16" fill="#D85A30"/><text x="56" y="382" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">3</text><text x="86" y="382" font-size="18" fill="#2c2c2a">量が多くて、負担になっている</text><rect x="36" y="440" width="608" height="120" rx="14" fill="#FFFFFF" stroke="#1D9E75" stroke-width="2"/><text x="60" y="486" font-size="17" font-weight="700" fill="#0F6E56">えらぶ基準は、ひとつ。</text><text x="60" y="518" font-size="16" fill="#3b3b39">「うちの子の性格・生活リズムに合うか」。</text><text x="60" y="544" font-size="16" fill="#3b3b39">この見極め方を、これから発信していきます。</text><text x="40" y="646" font-size="15" font-weight="600" fill="#8a857a">子育てまなびラボ ＠kosodate_manabi_lab</text></g></svg>