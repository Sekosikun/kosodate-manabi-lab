<svg width="680" height="680" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg"><title>幼児期、お金より効くこと3つ</title><desc>高い教材を買う前に、幼児期に効果的なこと3つ</desc><rect width="680" height="680" fill="#F7F3EA"/><rect width="680" height="150" fill="#1D9E75"/><g font-family="sans-serif"><text x="40" y="84" font-size="28" font-weight="700" fill="#F5F1E8">幼児期、お金より効くこと3つ</text><text x="40" y="122" font-size="18" fill="#eaf6f0">高い教材を買う、その前に</text><circle cx="56" cy="216" r="16" fill="#1D9E75"/><text x="56" y="222" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">1</text><text x="86" y="222" font-size="18" fill="#2c2c2a">とにかく、たくさん会話する</text><circle cx="56" cy="296" r="16" fill="#1D9E75"/><text x="56" y="302" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">2</text><text x="86" y="302" font-size="18" fill="#2c2c2a">毎日の読み聞かせ</text><circle cx="56" cy="376" r="16" fill="#1D9E75"/><text x="56" y="382" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">3</text><text x="86" y="382" font-size="18" fill="#2c2c2a">外遊び・手を使う遊び</text><rect x="36" y="440" width="608" height="110" rx="14" fill="#FFFFFF" stroke="#1D9E75" stroke-width="2"/><text x="60" y="486" font-size="17" font-weight="700" fill="#0F6E56">“体験”が、後の学びの土台。</text><text x="60" y="518" font-size="16" fill="#3b3b39">どれも、特別なお金はかかりません。</text><text x="40" y="646" font-size="15" font-weight="600" fill="#8a857a">子育てまなびラボ ＠kosodate_manabi_lab</text></g></svg>