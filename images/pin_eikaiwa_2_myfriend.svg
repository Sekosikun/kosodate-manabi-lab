<svg width="680" height="680" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg"><rect width="680" height="680" fill="#F7F3EA"/><rect width="680" height="128" fill="#1D9E75"/><g font-family="sans-serif"><text x="40" y="46" font-size="15" fill="#cfeae0">1社目 / 全5社</text><text x="40" y="98" font-size="38" font-weight="700" fill="#F5F1E8">マイフレ英語</text><rect x="40" y="150" width="600" height="98" rx="16" fill="#FFFFFF" stroke="#1D9E75" stroke-width="3"/><text x="66" y="192" font-size="21" font-weight="700" fill="#0F6E56">どんな教室？</text><text x="66" y="228" font-size="19" fill="#2c2c2a">3〜6歳向け、親子で遊ぶ体験型教材。1日5〜10分。</text><rect x="40" y="264" width="600" height="98" rx="16" fill="#FFFFFF" stroke="#1D9E75" stroke-width="3"/><text x="66" y="306" font-size="21" font-weight="700" fill="#0F6E56">向いている家庭</text><text x="66" y="342" font-size="19" fill="#2c2c2a">画面に頼りすぎず、親子いっしょの時間で英語に触れたい家庭。</text><rect x="40" y="378" width="600" height="98" rx="16" fill="#FFFFFF" stroke="#D85A30" stroke-width="3"/><text x="66" y="420" font-size="21" font-weight="700" fill="#B5631E">デメリット</text><text x="66" y="456" font-size="19" fill="#2c2c2a">講師レッスンはなく、親の関わりが必須。</text><rect x="40" y="492" width="600" height="146" rx="18" fill="#1D9E75"/><text x="66" y="538" font-size="21" font-weight="700" fill="#eafcf5">ひとことで言うと</text><text x="66" y="600" font-size="30" font-weight="700" fill="#FFFFFF">「レッスンより、親子時間を英語に」</text><text x="40" y="666" font-size="13" font-weight="600" fill="#0F6E56">子育て奮闘ママ ＠kosodate_manabi_lab</text></g></svg>
