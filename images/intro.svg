<svg width="100%" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg"><title>子育てまなびラボ 自己紹介カード</title><desc>共働き家庭の教育えらびナビとして、何を発信するかをまとめた自己紹介カード</desc><rect x="0" y="0" width="680" height="680" fill="#F7F3EA"/><rect x="0" y="0" width="680" height="180" fill="#1D9E75"/><g font-family="sans-serif"><text x="40" y="88" font-size="32" font-weight="700" fill="#F5F1E8">子育てまなびラボ</text><text x="40" y="122" font-size="17" fill="#cfeae0">＠kosodate_manabi_lab</text><text x="40" y="156" font-size="17" fill="#eaf6f0">共働き家庭の“教育えらび”ナビ</text><text x="40" y="244" font-size="20" font-weight="700" fill="#0F6E56">こんな発信をします</text><circle cx="52" cy="288" r="6" fill="#1D9E75"/><text x="72" y="294" font-size="17" fill="#2c2c2a">子の通信教育・こども英語・知育を中立に比較</text><circle cx="52" cy="332" r="6" fill="#1D9E75"/><text x="72" y="338" font-size="17" fill="#2c2c2a">親の学び直し・在宅スキルも</text><circle cx="52" cy="376" r="6" fill="#D85A30"/><text x="72" y="382" font-size="17" fill="#2c2c2a">良い点も“デメリット”も、正直に</text><circle cx="52" cy="420" r="6" fill="#BA7517"/><text x="72" y="426" font-size="17" fill="#2c2c2a">図解で「結局どれ？」にすぐ答える</text><line x1="40" y1="470" x2="640" y2="470" stroke="#e0d9cb" stroke-width="1"/><text x="40" y="514" font-size="19" fill="#3b3b39">忙しいあなたの教育えらびを、もっとラクに。</text><text x="40" y="610" font-size="16" font-weight="600" fill="#0F6E56">フォロー＆保存で、迷ったときの参考にどうぞ。</text><text x="40" y="644" font-size="15" fill="#8a857a">子育てまなびラボ ＠kosodate_manabi_lab</text></g></svg>